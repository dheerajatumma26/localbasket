<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Local Basket – Admin Panel</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
body{font-family:'Inter',sans-serif}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400}
.tab-btn.active{background:#173901;color:#fff}
dialog::backdrop{background:rgba(0,0,0,.5)}
</style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

<!-- Login overlay -->
<div id="login-overlay" class="fixed inset-0 z-50 bg-white flex items-center justify-center">
  <div class="w-full max-w-sm p-8 space-y-6">
    <div class="text-center"><h1 class="text-2xl font-bold text-[#173901]">🛒 Admin Panel</h1><p class="text-sm text-gray-500 mt-1">Log in as admin to continue</p></div>
    <div class="space-y-3">
      <input id="adm-email" type="email" value="admin@localbasket.com" class="w-full px-4 py-2.5 border rounded-lg text-sm" placeholder="Email"/>
      <input id="adm-pass" type="password" value="admin123" class="w-full px-4 py-2.5 border rounded-lg text-sm" placeholder="Password"/>
      <button onclick="admLogin()" class="w-full bg-[#173901] text-white py-2.5 rounded-lg font-bold text-sm">Login</button>
      <p id="adm-err" class="text-red-500 text-xs text-center hidden"></p>
    </div>
  </div>
</div>

<!-- Main layout -->
<div id="admin-app" class="hidden">
  <!-- Top bar -->
  <header class="bg-[#173901] text-white px-4 sm:px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2"><span class="material-symbols-outlined text-xl">admin_panel_settings</span><h1 class="text-lg font-bold">Local Basket Admin</h1></div>
    <div class="flex items-center gap-3">
      <span id="adm-name" class="text-sm text-white/70"></span>
      <button onclick="admLogout()" class="text-xs bg-white/15 px-3 py-1 rounded-full hover:bg-white/25">Logout</button>
    </div>
  </header>

  <!-- Tabs -->
  <nav class="bg-white border-b flex gap-1 px-4 sm:px-6 py-2 overflow-x-auto">
    <button onclick="showTab('dashboard')" class="tab-btn active px-4 py-1.5 rounded-full text-xs font-bold" data-tab="dashboard">Dashboard</button>
    <button onclick="showTab('products')" class="tab-btn px-4 py-1.5 rounded-full text-xs font-bold text-gray-500 hover:bg-gray-100" data-tab="products">Products</button>
    <button onclick="showTab('orders')" class="tab-btn px-4 py-1.5 rounded-full text-xs font-bold text-gray-500 hover:bg-gray-100" data-tab="orders">Orders</button>
    <button onclick="showTab('inventory')" class="tab-btn px-4 py-1.5 rounded-full text-xs font-bold text-gray-500 hover:bg-gray-100" data-tab="inventory">Inventory</button>
  </nav>

  <!-- Content -->
  <main class="max-w-6xl mx-auto px-4 sm:px-6 py-6">
    <!-- Dashboard -->
    <div id="tab-dashboard" class="tab-content">
      <h2 class="text-xl font-bold mb-4">Dashboard</h2>
      <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3" id="stats-grid"></div>
    </div>

    <!-- Products -->
    <div id="tab-products" class="tab-content hidden">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold">Products</h2>
        <button onclick="openProductModal()" class="bg-[#173901] text-white px-4 py-2 rounded-lg text-xs font-bold flex items-center gap-1"><span class="material-symbols-outlined text-sm">add</span>Add Product</button>
      </div>
      <div class="bg-white rounded-xl shadow-sm overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 text-left text-xs font-bold uppercase text-gray-500">
            <tr><th class="px-4 py-3">Product</th><th class="px-4 py-3">Category</th><th class="px-4 py-3">Price</th><th class="px-4 py-3">Stock</th><th class="px-4 py-3">Status</th><th class="px-4 py-3">Actions</th></tr>
          </thead>
          <tbody id="products-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Orders -->
    <div id="tab-orders" class="tab-content hidden">
      <h2 class="text-xl font-bold mb-4">Orders</h2>
      <div id="orders-list" class="space-y-3"></div>
    </div>

    <div id="tab-inventory" class="tab-content hidden">
      <h2 class="text-xl font-bold mb-4 text-[#173901]">Quick Stock & Price Manager</h2>
      <div class="bg-white rounded-xl shadow-sm overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 text-left text-xs font-bold uppercase text-gray-500">
            <tr><th class="px-4 py-3">Product</th><th class="px-4 py-3">Price (₹)</th><th class="px-4 py-3">Stock</th><th class="px-4 py-3">Status</th><th class="px-4 py-3">Action</th></tr>
          </thead>
          <tbody id="inv-tbody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Product Edit Modal -->
<dialog id="product-modal" class="rounded-xl p-0 w-full max-w-md shadow-2xl">
  <div class="p-6 space-y-4">
    <div class="flex justify-between items-center"><h3 id="modal-title" class="font-bold text-lg">Add Product</h3><button onclick="document.getElementById('product-modal').close()" class="text-gray-400 hover:text-gray-600"><span class="material-symbols-outlined">close</span></button></div>
    <input type="hidden" id="pm-id"/>
    <div class="grid grid-cols-2 gap-3">
      <div class="col-span-2"><label class="text-xs font-bold text-gray-500">Name</label><input id="pm-name" class="w-full px-3 py-2 border rounded-lg text-sm mt-1"/></div>
      <div><label class="text-xs font-bold text-gray-500">Category</label><select id="pm-cat" class="w-full px-3 py-2 border rounded-lg text-sm mt-1"><option>vegetables</option><option>fruits</option><option>dairy</option><option>bakery</option><option>spices</option><option>meat</option><option>snacks</option></select></div>
      <div><label class="text-xs font-bold text-gray-500">Farm</label><input id="pm-farm" class="w-full px-3 py-2 border rounded-lg text-sm mt-1"/></div>
      <div><label class="text-xs font-bold text-gray-500">Price (₹)</label><input id="pm-price" type="number" class="w-full px-3 py-2 border rounded-lg text-sm mt-1"/></div>
      <div><label class="text-xs font-bold text-gray-500">Unit</label><input id="pm-unit" class="w-full px-3 py-2 border rounded-lg text-sm mt-1" placeholder="500g"/></div>
      <div><label class="text-xs font-bold text-gray-500">Stock</label><input id="pm-stock" type="number" class="w-full px-3 py-2 border rounded-lg text-sm mt-1" value="100"/></div>
      <div><label class="text-xs font-bold text-gray-500">Badge</label><input id="pm-badge" class="w-full px-3 py-2 border rounded-lg text-sm mt-1" placeholder="Organic"/></div>
      <div class="col-span-2"><label class="text-xs font-bold text-gray-500">Image Upload / URL</label>
        <div class="flex gap-2 items-center mt-1"><input type="file" id="pm-file" accept="image/*" class="w-full text-xs" onchange="readImg()"/></div>
        <input id="pm-img" class="w-full px-3 py-2 border rounded-lg text-sm mt-2" placeholder="Base64 data or Image URL will appear here"/>
      </div>
      <div class="col-span-2"><label class="text-xs font-bold text-gray-500">Description</label><textarea id="pm-desc" rows="2" class="w-full px-3 py-2 border rounded-lg text-sm mt-1"></textarea></div>
    </div>
    <button onclick="saveProduct()" class="w-full bg-[#173901] text-white py-2.5 rounded-lg font-bold text-sm">Save Product</button>
  </div>
</dialog>

<script>
function readImg(){
  const f=document.getElementById('pm-file').files[0];
  if(!f)return;
  const r=new FileReader();
  r.onload=e=>{document.getElementById('pm-img').value=e.target.result;};
  r.readAsDataURL(f);
}
const API='';
let adminUser=null;

async function F(u,o={}){const r=await fetch(API+u,{credentials:'include',headers:{'Content-Type':'application/json'},...o});return r.json()}

// Auth
async function admLogin(){
  const e=document.getElementById('adm-email').value, p=document.getElementById('adm-pass').value;
  const d=await F('/api/auth/login',{method:'POST',body:JSON.stringify({email:e,password:p})});
  if(d.error){document.getElementById('adm-err').textContent=d.error;document.getElementById('adm-err').classList.remove('hidden');return}
  if(!d.user.is_admin){document.getElementById('adm-err').textContent='Not an admin';document.getElementById('adm-err').classList.remove('hidden');return}
  adminUser=d.user;
  document.getElementById('login-overlay').classList.add('hidden');
  document.getElementById('admin-app').classList.remove('hidden');
  document.getElementById('adm-name').textContent=adminUser.name;
  loadDashboard();
}

async function admLogout(){
  await F('/api/auth/logout',{method:'POST'});
  location.reload();
}

// Check existing session
(async()=>{
  const d=await F('/api/auth/me');
  if(d.user && d.user.is_admin){
    adminUser=d.user;
    document.getElementById('login-overlay').classList.add('hidden');
    document.getElementById('admin-app').classList.remove('hidden');
    document.getElementById('adm-name').textContent=adminUser.name;
    loadDashboard();
  }
})();

// Tabs
function showTab(tab){
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.add('hidden'));
  document.getElementById('tab-'+tab).classList.remove('hidden');
  document.querySelectorAll('.tab-btn').forEach(b=>{b.classList.remove('active');b.classList.add('text-gray-500')});
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  document.querySelector(`[data-tab="${tab}"]`).classList.remove('text-gray-500');
  if(tab==='dashboard')loadDashboard();
  if(tab==='products')loadProducts();
  if(tab==='orders')loadOrders();
  if(tab==='inventory')loadInventory();
}

// Dashboard
async function loadDashboard(){
  const s=await F('/api/admin/stats');
  document.getElementById('stats-grid').innerHTML=`
    ${sc('📦','Products',s.totalProducts,'bg-green-50 text-green-700')}
    ${sc('✅','Active',s.activeProducts,'bg-blue-50 text-blue-700')}
    ${sc('🛒','Orders',s.totalOrders,'bg-orange-50 text-orange-700')}
    ${sc('💰','Revenue','₹'+Math.round(s.totalRevenue).toLocaleString(),'bg-purple-50 text-purple-700')}
    ${sc('⚠️','Low Stock',s.lowStock,'bg-red-50 text-red-700')}
  `;
}
function sc(ico,label,val,cls){return `<div class="${cls} p-4 rounded-xl"><div class="text-2xl mb-1">${ico}</div><div class="text-2xl font-bold">${val}</div><div class="text-xs font-medium opacity-70 mt-0.5">${label}</div></div>`}

// Products
async function loadProducts(){
  const prods=await F('/api/admin/products');
  document.getElementById('products-tbody').innerHTML=prods.map(p=>`
    <tr class="border-t hover:bg-gray-50">
      <td class="px-4 py-3 flex items-center gap-2"><img src="${p.img}=w40" class="w-8 h-8 rounded object-cover"/><div><div class="font-medium text-xs">${p.name}</div><div class="text-[10px] text-gray-400">${p.farm}</div></div></td>
      <td class="px-4 py-3 text-xs"><span class="bg-gray-100 px-2 py-0.5 rounded-full">${p.category}</span></td>
      <td class="px-4 py-3 font-medium text-xs">₹${p.price}</td>
      <td class="px-4 py-3 text-xs"><span class="${p.stock<20?'text-red-600 font-bold':'text-gray-600'}">${p.stock}</span></td>
      <td class="px-4 py-3 text-xs">${p.is_active?'<span class="text-green-600 font-bold">Active</span>':'<span class="text-red-400">Inactive</span>'}</td>
      <td class="px-4 py-3 flex gap-1">
        <button onclick='editProduct(${JSON.stringify(p).replace(/'/g,"&#39;")})' class="text-blue-600 hover:bg-blue-50 p-1 rounded"><span class="material-symbols-outlined text-sm">edit</span></button>
        <button onclick="delProduct('${p.id}')" class="text-red-500 hover:bg-red-50 p-1 rounded"><span class="material-symbols-outlined text-sm">delete</span></button>
      </td>
    </tr>`).join('');
}

function openProductModal(p=null){
  const m=document.getElementById('product-modal');
  document.getElementById('modal-title').textContent=p?'Edit Product':'Add Product';
  document.getElementById('pm-id').value=p?p.id:'';
  document.getElementById('pm-name').value=p?p.name:'';
  document.getElementById('pm-cat').value=p?p.category:'vegetables';
  document.getElementById('pm-farm').value=p?p.farm:'';
  document.getElementById('pm-price').value=p?p.price:'';
  document.getElementById('pm-unit').value=p?p.unit:'';
  document.getElementById('pm-stock').value=p?p.stock:100;
  document.getElementById('pm-badge').value=p?p.badge||'':'';
  document.getElementById('pm-file').value='';
  document.getElementById('pm-img').value=p?p.img:'';
  document.getElementById('pm-desc').value=p?p.description||'':'';
  m.showModal();
}

function editProduct(p){openProductModal(p)}

async function saveProduct(){
  const id=document.getElementById('pm-id').value;
  const data={name:document.getElementById('pm-name').value,category:document.getElementById('pm-cat').value,farm:document.getElementById('pm-farm').value,price:parseFloat(document.getElementById('pm-price').value),unit:document.getElementById('pm-unit').value,stock:parseInt(document.getElementById('pm-stock').value),badge:document.getElementById('pm-badge').value||null,img:document.getElementById('pm-img').value,description:document.getElementById('pm-desc').value};
  if(id){await F('/api/admin/products/'+id,{method:'PUT',body:JSON.stringify(data)})}
  else{await F('/api/admin/products',{method:'POST',body:JSON.stringify(data)})}
  document.getElementById('product-modal').close();
  loadProducts();loadDashboard();
}

async function delProduct(id){
  if(!confirm('Delete this product?'))return;
  await F('/api/admin/products/'+id,{method:'DELETE'});
  loadProducts();loadDashboard();
}

// Orders
async function loadOrders(){
  const orders=await F('/api/admin/orders');
  document.getElementById('orders-list').innerHTML=orders.length?orders.map(o=>{
    const statusColors={'Confirmed':'bg-blue-100 text-blue-700','Preparing':'bg-yellow-100 text-yellow-700','Packed':'bg-purple-100 text-purple-700','Out for Delivery':'bg-orange-100 text-orange-700','Delivered':'bg-green-100 text-green-700'};
    const sc=statusColors[o.status]||'bg-gray-100';
    return `<div class="bg-white rounded-xl p-4 shadow-sm border">
      <div class="flex justify-between items-start mb-2">
        <div><span class="font-mono font-bold text-sm">#${o.id}</span><span class="text-xs text-gray-400 ml-2">${o.user_email||'Guest'}</span></div>
        <div class="flex items-center gap-2">
          <span class="${sc} px-2 py-0.5 rounded-full text-[10px] font-bold">${o.status}</span>
          <select onchange="updateStatus('${o.id}',this.value)" class="text-xs border rounded px-2 py-1">
            <option value="Confirmed" ${o.status==='Confirmed'?'selected':''}>Confirmed</option>
            <option value="Preparing" ${o.status==='Preparing'?'selected':''}>Preparing</option>
            <option value="Packed" ${o.status==='Packed'?'selected':''}>Packed</option>
            <option value="Out for Delivery" ${o.status==='Out for Delivery'?'selected':''}>Out for Delivery</option>
            <option value="Delivered" ${o.status==='Delivered'?'selected':''}>Delivered</option>
          </select>
        </div>
      </div>
      <div class="text-xs text-gray-500">${(o.items||[]).map(i=>i.product_name+' ×'+i.qty).join(', ')}</div>
      <div class="flex justify-between mt-2 text-sm"><span class="text-gray-400 text-xs">${o.created_at}</span><span class="font-bold text-[#173901]">₹${Math.round(o.grand_total)}</span></div>
    </div>`}).join(''):'<div class="text-center py-8 text-gray-400">No orders yet</div>';
}

async function updateStatus(id,s){await F('/api/admin/orders/'+id+'/status',{method:'PUT',body:JSON.stringify({status:s})});loadOrders()}

// Inventory
async function loadInventory(){
  const prods=await F('/api/admin/products');
  document.getElementById('inv-tbody').innerHTML=prods.map(p=>`
    <tr class="border-t hover:bg-gray-50 ${p.is_active?'':'opacity-50'}">
      <td class="px-4 py-3 flex items-center gap-2">
        <img src="${p.img}" class="w-6 h-6 rounded object-cover"/>
        <span class="text-xs font-medium">${p.name}</span>
      </td>
      <td class="px-4 py-3"><input type="number" value="${p.price}" class="w-20 px-2 py-1 border rounded text-xs" id="inv-pr-${p.id}"/></td>
      <td class="px-4 py-3"><input type="number" value="${p.stock}" class="w-20 px-2 py-1 border rounded text-xs" id="inv-st-${p.id}"/></td>
      <td class="px-4 py-3">
        <button onclick="toggleActive('${p.id}', ${!p.is_active})" class="px-3 py-1 rounded-full text-[10px] font-bold ${p.is_active?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">${p.is_active?'Active':'Hidden'}</button>
      </td>
      <td class="px-4 py-3"><button onclick="updateInv('${p.id}')" class="bg-[#173901] text-white px-3 py-1 rounded text-[10px] font-bold shadow-sm">Save</button></td>
    </tr>`).join('');
}

async function toggleActive(id, act){
  await F('/api/admin/products',{method:'PATCH',body:JSON.stringify({id, is_active:act})});
  loadInventory();
}

async function updateInv(id){
  const price=parseFloat(document.getElementById('inv-pr-'+id).value);
  const stock=parseInt(document.getElementById('inv-st-'+id).value);
  await F('/api/admin/products',{method:'PATCH',body:JSON.stringify({id, price, stock})});
  loadInventory();
}
</script>
</body>
</html>
